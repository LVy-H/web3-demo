version: '3.8'

services:
  contracts:
    build:
      context: ./contracts
    ports:
      - "8545:8545"
    volumes:
      - ./contracts:/app
      - ./frontend/src:/app/frontend/src
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_HOST=0.0.0.0
    depends_on:
      - contracts
    volumes:
      - ./frontend:/app
      - /app/node_modules
